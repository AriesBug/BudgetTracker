<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
<link rel="manifest" href="/manifest.json">
<title>Tracking</title>
</head>
<body>

<h1>Your Budget</h1>

<h2>Remaining Budget:</h2>
<p id="budget"></p>

<hr>

<h2>Add to Budget</h2>
<input type="number" id="addBudgetAmount" placeholder="Amount">
<button onclick="addToBudget()">Add</button>

<h2>Remove from Budget</h2>
<input type="number" id="removeBudgetAmount" placeholder="Amount">
<button onclick="removeFromBudget()">Remove</button>

<hr>

<h2>Add Expense</h2>

<input type="text" id="expenseName" placeholder="Expense name">
<input type="number" id="expenseAmount" placeholder="Amount">
<button onclick="addExpense()">Add Expense</button>

<h2>Expenses Today</h2>
<ul id="expenseList"></ul>

<script>


var budget = Number(localStorage.getItem("budget"));
document.getElementById("budget").textContent = budget;


function addToBudget(){
    var amount = Number(document.getElementById("addBudgetAmount").value);
    if(amount <= 0){ alert("Enter a valid amount"); return; }

    budget += amount;
    document.getElementById("budget").textContent = budget;
    document.getElementById("addBudgetAmount").value = "";
}

function removeFromBudget(){
    var amount = Number(document.getElementById("removeBudgetAmount").value);
    if(amount <= 0){ alert("Enter a valid amount"); return; }

    budget -= amount;
    document.getElementById("budget").textContent = budget;
    document.getElementById("removeBudgetAmount").value = "";
}


function addExpense(){
    var name = document.getElementById("expenseName").value;
    var amount = Number(document.getElementById("expenseAmount").value);

    if(name === "" || amount <= 0){
        alert("Enter expense name and amount");
        return;
    }

    budget -= amount;
    document.getElementById("budget").textContent = budget;

    var li = document.createElement("li");
    li.textContent = name + " - $" + amount + " ";

    var removeBtn = document.createElement("button");
    removeBtn.textContent = "Remove";

    removeBtn.onclick = function(){
        budget += amount; 
        document.getElementById("budget").textContent = budget;
        li.remove();
    };

    li.appendChild(removeBtn);
    document.getElementById("expenseList").appendChild(li);

    document.getElementById("expenseName").value = "";
    document.getElementById("expenseAmount").value = "";
}

// Register service worker
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
        .then(reg => console.log('Service Worker registered:', reg.scope))
        .catch(err => console.error('Service Worker registration failed:', err))
    })
}

</script>

</body>
</html>
